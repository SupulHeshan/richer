[project]
name = "jricher"
version = "0.1.11"
description = "Enhanced console output for Jac CLI with Rich formatting"
authors = [
    { name = "Jason Mars", email = "jason@mars.ninja" }
]
maintainers = [
    { name = "Jason Mars", email = "jason@mars.ninja" }
]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "console", "rich", "cli"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/Jaseci-Labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"

[project.include]
packages = ["richer*"]

[project.include.data]
richer = ["_precompiled/**/*.jir", "_precompiled/manifest.json"]

[dependencies]
jaclang = ">=0.14.1"
rich = ">=13.0.0"

[entrypoints.jac]
console = "richer.plugin.console:RicherPlugin"
